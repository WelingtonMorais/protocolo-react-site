# Cole dentro do bloco `server { ... }` HTTPS de protocolocondo.com.br
# (junto com o location / que aponta para a landing em :8080).
# React (Vite preview) escuta em 127.0.0.1:8081 com base path /system/

location = /system {
    return 301 https://$host/system/;
}

location /system/ {
    proxy_pass http://127.0.0.1:8081;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}
